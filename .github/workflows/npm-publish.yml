name: Publish npm Package

on:
  workflow_dispatch:
  push:
    tags:
      - "npm-v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @shings/oracle-todo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm/oracle-todo
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Test wrapper
        run: npm test
      - name: Publish to npm
        run: npm publish --access public
